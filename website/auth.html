<!DOCTYPE html>
<html lang="vn" data-bs-theme="dark">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WG Cinema - Authentication</title>
    <link rel="icon" type="image/x-icon" href="../icon.ico" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="stylesheet" href="scripts/style.css" />
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="scripts/main.js" defer></script>
</head>
<body class="modern-theme auth-page">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Background Elements -->
    <div class="bg-shape bg-shape-1"></div>
    <div class="bg-shape bg-shape-2"></div>
    <div class="bg-shape bg-shape-3"></div>

    <header class="header">
        <nav class="navbar navbar-expand-lg fixed-top">
            <div class="container-fluid">
                <a class="navbar-brand me-auto text-light" href="index.html">
                    <img src="../icon.ico" alt="WG Logo" width="40px" />
                </a>
                <div class="offcanvas offcanvas-end" tabindex="-1" id="offcanvasNavbar">
                    <div class="offcanvas-header">
                        <h5 class="offcanvas-title"><img src="../icon.ico" alt="" width="40px" /></h5>
                        <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
                    </div>
                    <div class="offcanvas-body">
                        <ul class="navbar-nav flex-grow-1 pe-3">
                            <li class="nav-item"><a class="nav-link mx-lg-2" href="index.html#pills-home">Phim Đang Chiếu</a></li>
                            <li class="nav-item"><a class="nav-link mx-lg-2" href="index.html#pills-sub">Phim Sắp Chiếu</a></li>
                            <li class="nav-item"><a class="nav-link mx-lg-2" href="about.html">Về Chúng Tôi</a></li>
                            <li class="nav-item align-self-center">
                                <div class="form-check form-switch ms-3">
                                    <input class="form-check-input" type="checkbox" role="switch" checked id="flexSwitchCheckDefault" />
                                    <label class="form-check-label" for="flexSwitchCheckDefault">Chế Độ Tối</label>
                                </div>
                            </li>
                        </ul>
                    </div>
                </div>
                <a href="auth.html?mode=login" class="login-button left-bt-login active">Đăng Nhập</a>
                <a href="auth.html?mode=register" class="login-button right-bt-sign">Đăng Ký</a>
                <button class="navbar-toggler border-0 shadow-none" type="button" data-bs-toggle="offcanvas" data-bs-target="#offcanvasNavbar">
                    <span class="navbar-toggler-icon"></span>
                </button>
            </div>
        </nav>
    </header>

    <div class="auth-container mt-5">
        <div class="auth-box glass-panel">
            <!-- Tabs -->
            <div class="auth-tabs d-flex">
                <button class="auth-tab active flex-fill" id="tab-login" onclick="switchAuthTab('login')">Đăng Nhập</button>
                <button class="auth-tab flex-fill" id="tab-register" onclick="switchAuthTab('register')">Đăng Ký</button>
            </div>

            <div class="auth-body p-4 p-md-5">
                <!-- Login Form -->
                <form id="login-form" class="auth-form active" onsubmit="return handleLogin(event);">
                    <div class="text-center mb-4">
                        <h3 class="fw-bold gradient-text">Mừng bạn trở lại!</h3>
                        <p class="text-muted-custom small">Đăng nhập để đặt vé ngay</p>
                    </div>
                    <div class="mb-4 input-group-custom">
                        <i class="fa fa-user input-icon"></i>
                        <input type="text" id="login-username" class="form-control custom-input" placeholder="Tên đăng nhập" required />
                    </div>
                    <div class="mb-4 input-group-custom">
                        <i class="fa fa-lock input-icon"></i>
                        <input type="password" id="login-password" class="form-control custom-input" placeholder="Mật khẩu" required />
                    </div>
                    <div class="d-flex justify-content-between align-items-center mb-4 small">
                        <div class="form-check">
                            <input class="form-check-input custom-checkbox" type="checkbox" id="remember-me">
                            <label class="form-check-label text-muted-custom" for="remember-me">Ghi nhớ tôi</label>
                        </div>
                        <a href="#" class="text-gradient fw-medium text-decoration-none">Quên mật khẩu?</a>
                    </div>
                    <button type="submit" class="btn btn-gradient w-100 py-2 fw-bold text-uppercase shadow-sm">Đăng Nhập</button>
                </form>

                <!-- Register Form -->
                <form id="register-form" class="auth-form" onsubmit="return handleRegister(event);" style="display: none;">
                    <div class="text-center mb-4">
                        <h3 class="fw-bold gradient-text">Tạo Tài Khoản</h3>
                        <p class="text-muted-custom small">Trở thành thành viên của WG Cinema</p>
                    </div>
                    <div class="mb-4 input-group-custom">
                        <i class="fa fa-user input-icon"></i>
                        <input type="text" id="reg-username" class="form-control custom-input" placeholder="Tên đăng nhập" required />
                    </div>
                    <div class="mb-4 input-group-custom">
                        <i class="fa fa-envelope input-icon"></i>
                        <input type="email" id="reg-email" class="form-control custom-input" placeholder="Email" required />
                    </div>
                    <div class="mb-4 input-group-custom">
                        <i class="fa fa-lock input-icon"></i>
                        <input type="password" id="reg-password" class="form-control custom-input" placeholder="Mật khẩu" required />
                    </div>
                    <div class="mb-4 input-group-custom">
                        <i class="fa fa-check-circle input-icon"></i>
                        <input type="password" id="reg-confirm-password" class="form-control custom-input" placeholder="Xác nhận mật khẩu" required />
                    </div>
                    <button type="submit" class="btn btn-gradient w-100 py-2 fw-bold text-uppercase shadow-sm">Đăng Ký</button>
                </form>

                <!-- Social Login -->
                <div class="social-login mt-5 text-center">
                    <p class="text-muted-custom small mb-3 position-relative social-divider">Hoặc tiếp tục với</p>
                    <div class="d-flex justify-content-center gap-3">
                        <a href="#" class="btn-social google"><i class="fab fa-google"></i></a>
                        <a href="#" class="btn-social facebook"><i class="fab fa-facebook-f"></i></a>
                        <a href="#" class="btn-social twitter"><i class="fab fa-twitter"></i></a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
